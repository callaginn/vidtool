<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Vidtool Uploader</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
		<link rel="stylesheet" href="styles.css">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	</head>
	
	<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
		<div class="container-fluid d-flex justify-content-center">
			<div class="card shadow" id="mainCard" style="width: 560px;">
				<div class="p-4">
					<h1 class="h4 mb-3">Upload Video</h1>
					
					<form id="videoForm" enctype="multipart/form-data" method="POST" action="upload.php" class="d-flex flex-column gap-3">
						<div id="dropZone" class="text-center rounded">
							<i class="bi bi-cloud-arrow-up d-block mb-2 drop-icon lh-1"></i>
							<span class="text-muted">Drop video here or <span class="text-primary" style="cursor: pointer;">browse</span></span>
							<input class="d-none" type="file" id="file" name="video_file" accept="video/*">
						</div>
						
						<div id="fileInfo" class="d-none">
							<div class="d-flex align-items-center justify-content-between">
								<div class="d-flex align-items-center gap-2 text-truncate">
									<i class="bi bi-film text-muted"></i>
									<span id="fileName" class="text-truncate"></span>
									<span id="fileSize" class="text-muted text-nowrap"></span>
								</div>
								<button type="button" id="clearFile" class="btn btn-link btn-sm text-muted p-0">
									<i class="bi bi-x-lg"></i>
								</button>
							</div>
						</div>
						
						<div class="form-floating">
							<input class="form-control" type="text" name="output_filename" id="output_filename" placeholder="Output filename" value="output.mp4">
							<label for="output_filename">Output filename</label>
						</div>
						
						<div class="form-floating">
							<input class="form-control" type="text" name="width" id="width" placeholder="Width" value="1280">
							<label for="width">Width</label>
						</div>
						
						<div id="progressWrapper" class="d-none">
							<div class="progress progress-thin mb-1">
								<div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
							</div>
							<p id="progressText" class="text-center text-muted small m-0">0%</p>
						</div>
						
						<button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100 py-3 d-none">
							Upload and Process<i class="bi bi-arrow-right ms-2"></i>
						</button>
					</form>
					
					<div id="downloadLinks"></div>
					
					<span id="logsToggle" class="text-center mt-3">
						<i class="bi bi-terminal me-1"></i><span id="logsToggleText">Show logs</span>
					</span>
				</div>
				
				<div id="logsPanel">
					<div id="logsPanelInner" class="position-relative border-top">
						<button id="viewToggle" class="view-toggle position-absolute d-flex align-items-center justify-content-center" title="Show terminal">
							<i class="bi bi-terminal"></i>
						</button>
						
						<div id="tabSummary">
							<div class="p-4 d-flex flex-column gap-3">
								<div id="sumInput" class="d-none">
									<div class="sum-label fw-semibold text-uppercase">Input</div>
									<div class="mt-1">
										<span id="sumTitle" class="sum-hero-title fw-semibold"></span>
										<span id="sumArtist" class="sum-hero-artist d-block"></span>
									</div>
									<div id="sumChips" class="sum-chips d-flex flex-wrap mt-2"></div>
								</div>
								<div id="sumOutputs" class="d-none">
									<div class="sum-label fw-semibold text-uppercase">Outputs</div>
									<div id="sumOutputList" class="d-flex flex-wrap gap-2 mt-1"></div>
								</div>
								<div id="sumEncoding" class="d-none">
									<div class="sum-label fw-semibold text-uppercase">Encoding</div>
									<div class="d-flex align-items-center gap-3 mt-1">
										<div class="sum-speed-box text-center">
											<div id="sumSpeed" class="sum-speed-value">--</div>
											<div class="sum-speed-label text-uppercase">speed</div>
										</div>
										<div class="sum-position-text">
											<span id="sumPosition">--</span>
										</div>
									</div>
								</div>
								<div id="sumResults" class="d-none">
									<div class="sum-label fw-semibold text-uppercase">Output sizes</div>
									<div id="sumBarChart" class="d-flex flex-column gap-2 mt-1"></div>
								</div>
								<div id="sumComplete" class="d-none">
									<div class="sum-success d-flex align-items-center fw-medium">
										<i class="bi bi-check-circle-fill me-2"></i>
										<span id="sumTotalTime"></span>
									</div>
								</div>
							</div>
						</div>
						
						<div id="tabTerminal" class="d-none">
							<pre id="log" aria-live="polite" aria-atomic="true" class="bg-dark text-light p-3 overflow-auto m-0"><code class="language-bash"></code></pre>
						</div>
					</div>
				</div>
			</div>
		</div>
		
		<script src="scripts.js"></script>
	</body>
</html>
